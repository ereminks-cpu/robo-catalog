<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<header><div><h1>ROBO Catalog</h1><p>Клик по строке открывает карточку робота</p></div><b id="count"></b></header>

dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-023", "manufacturer": "Reeman", "country": "Китай", "model": "Snail Sweeping Cleaning Robot", "type": "Внутренняя", "purpose": "Подметальный", "subtype": "Малогабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-033", "manufacturer": "Reeman", "country": "Китай", "model": "Smart Sweeping Robot", "type": "Уличная / Промышленная", "purpose": "Подметальный", "subtype": "Микро", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-019", "manufacturer": "Rosiwit Cobotics", "country": "Китай", "model": "Polit One NEO", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-020", "manufacturer": "Rosiwit Cobotics", "country": "Китай", "model": "Titan 810", "type": "Внутренняя / Промышленная", "purpose": "Поломоечный", "subtype": "Среднегабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-015", "manufacturer": "SoftBank Robotics", "country": "Япония", "model": "Whiz", "type": "Внутренняя", "purpose": "Пылесос", "subtype": "Пылесос", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-017", "manufacturer": "Sparkoz", "country": "Китай", "model": "TN10 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Малогабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-018", "manufacturer": "Sparkoz", "country": "Китай", "model": "TN70 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-021", "manufacturer": "Sveaverken", "country": "Швеция", "model": "Sveabot M100", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Крупногабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-032", "manufacturer": "Viggo (OneDrivePlus)", "country": "Китай", "model": "SC50 / SC50 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}, {"id": "R-024", "manufacturer": "Viggo (OneDrivePlus)", "country": "Китай", "model": "SC80 / SC80 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Крупногабаритный", "link": "", "cleanWater": "", "dirtyWater": "", "productivity": "", "width": "", "note": ""}];
const ROBOTS_KEY='roboCatalogRobots_v2', IMAGES_KEY='roboCatalogImages_v1';
let currentId=null, robots=getRobots();
function getRobots(){try{return JSON.parse(localStorage.getItem(ROBOTS_KEY)||'null')||initialRobots}catch(e){return initialRobots}}
function setRobots(v){localStorage.setItem(ROBOTS_KEY,JSON.stringify(v))}
function getImages(){try{return JSON.parse(localStorage.getItem(IMAGES_KEY)||'{}')}catch(e){return {}}}
function setImages(v){localStorage.setItem(IMAGES_KEY,JSON.stringify(v))}
const body=document.getElementById('body'), q=document.getElementById('q'), m=document.getElementById('m'), s=document.getElementById('s'), count=document.getElementById('count');
function uniq(k){return [...new Set(robots.map(x=>x[k]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru'))}
function refill(){m.innerHTML='<option value="">Все производители</option>';s.innerHTML='<option value="">Все подтипы</option>';uniq('manufacturer').forEach(v=>m.add(new Option(v,v)));uniq('subtype').forEach(v=>s.add(new Option(v,v)))}
function imageCell(id){const img=getImages()[id];return img?`<img class="thumb" src="${img}">`:`<div class="miniPlaceholder">Нет фото</div>`}
function render(){const text=q.value.toLowerCase();const rows=robots.filter(r=>(!text||Object.values(r).join(' ').toLowerCase().includes(text))&&(!m.value||r.manufacturer===m.value)&&(!s.value||r.subtype===s.value));count.textContent=rows.length+' моделей';body.innerHTML=rows.map(r=>`<tr onclick="openCard('${r.id}')"><td>${imageCell(r.id)}</td><td>${r.id}</td><td><b>${r.manufacturer}</b></td><td>${r.country}</td><td>${r.model}</td><td>${r.type}</td><td>${r.purpose}</td><td><span>${r.subtype}</span></td></tr>`).join('')}
[q,m,s].forEach(x=>x.addEventListener('input',render));refill();render();
const labels={id:'ID',manufacturer:'Производитель',country:'Страна',model:'Модель',type:'Тип',purpose:'Назначение',subtype:'Подтип',link:'Ссылка на модель',cleanWater:'Бак чистой воды, л',dirtyWater:'Бак грязной воды, л',productivity:'Производительность, м²/ч',width:'Ширина уборки, мм',note:'Комментарий'};
const editable=['manufacturer','country','model','type','purpose','subtype','link','cleanWater','dirtyWater','productivity','width','note'];
function openCard(id){currentId=id;const r=robots.find(x=>x.id===id);if(!r)return;document.getElementById('cardTitle').textContent=`${r.manufacturer} ${r.model}`;drawPhoto();const fields=document.querySelector('#editForm .fields');fields.innerHTML=`<label>${labels.id}<input value="${r.id}" disabled></label>`+editable.map(k=>`<label>${labels[k]}<input name="${k}" value="${String(r[k]||'').replaceAll('"','&quot;')}"></label>`).join('');document.getElementById('card').classList.add('open')}
function closeCard(){document.getElementById('card').classList.remove('open');currentId=null}
function drawPhoto(){const img=getImages()[currentId];document.getElementById('cardPhoto').innerHTML=img?`<img src="${img}">`:'<div>Нет фото</div>'}
document.getElementById('editForm').onsubmit=e=>{e.preventDefault();const r=robots.find(x=>x.id===currentId);if(!r)return;new FormData(e.target).forEach((v,k)=>r[k]=v);setRobots(robots);refill();render();openCard(currentId)};
function resizeImage(file,maxSize=520,quality=.76){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=e=>{const im=new Image();im.onload=()=>{const sc=Math.min(maxSize/im.width,maxSize/im.height,1);const c=document.createElement('canvas');c.width=Math.round(im.width*sc);c.height=Math.round(im.height*sc);c.getContext('2d').drawImage(im,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',quality))};im.onerror=rej;im.src=e.target.result};rd.onerror=rej;rd.readAsDataURL(file)})}
document.getElementById('cardFile').onchange=async e=>{const f=e.target.files[0];if(!f||!currentId)return;const imgs=getImages();imgs[currentId]=await resizeImage(f);setImages(imgs);drawPhoto();render()};
function removeCurrentImage(){if(!currentId)return;const imgs=getImages();delete imgs[currentId];setImages(imgs);drawPhoto();render()}
document.getElementById('exportAll').onclick=()=>{const blob=new Blob([JSON.stringify({robots,images:getImages()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='robo-catalog-full.json';a.click()};
document.getElementById('importAll').onchange=async e=>{const f=e.target.files[0];if(!f)return;const data=JSON.parse(await f.text());if(data.robots){robots=data.robots;setRobots(robots)}if(data.images){setImages({...getImages(),...data.images})}refill();render()};
document.getElementById('resetEdits').onclick=()=>{if(confirm('Сбросить текстовые правки? Фото останутся.')){localStorage.removeItem(ROBOTS_KEY);robots=getRobots();refill();render()}};
</script></body></html>
