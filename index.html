<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROBO Catalog</title><link rel="stylesheet" href="style.css">
</head>
<body>
<header><div><h1>ROBO Catalog</h1><p>Справочник автономных роботов-уборщиков для рынка РФ и СНГ</p></div><b id="count"></b></header>
<section class="controls"><input id="q" placeholder="Поиск"><select id="m"><option value="">Все производители</option></select><select id="s"><option value="">Все подтипы</option></select></section>
<section class="image-tools"><button id="exportBtn">Скачать базу фото</button><label class="importLabel">Загрузить базу фото<input id="importFile" type="file" accept="application/json"></label><button id="clearImagesBtn">Очистить фото</button><p>Фото сохраняются в браузере пользователя. Для передачи другому человеку используйте экспорт/импорт JSON.</p></section>
<main><table><thead><tr><th>Фото</th><th>ID</th><th>Производитель</th><th>Страна</th><th>Модель</th><th>Тип</th><th>Назначение</th><th>Подтип</th></tr></thead><tbody id="body"></tbody></table></main>
<div id="modal" class="modal" onclick="this.classList.remove('open')"><img id="modalImg" alt=""></div>
<script>
const robots = [{"id": "R-016", "manufacturer": "Agibot", "country": "Китай", "model": "C5", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-031", "manufacturer": "Agibot", "country": "Китай", "model": "C2", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Микро"}, {"id": "R-010", "manufacturer": "Avidbots", "country": "Канада", "model": "Neo", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-034", "manufacturer": "Avidbots", "country": "Канада", "model": "Neo 2W", "type": "Внутренняя / Промышленная", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-035", "manufacturer": "Avidbots", "country": "Канада", "model": "Kas", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-029", "manufacturer": "Autonomics", "country": "США", "model": "RUBI-B", "type": "Уличная", "purpose": "Подметально-поломоечный", "subtype": "Крупногабаритный"}, {"id": "R-013", "manufacturer": "Cleanfix", "country": "Швейцария", "model": "RA660 Navi", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-027", "manufacturer": "FY-Bot", "country": "Китай", "model": "Sweep XL", "type": "Уличная / Промышленная", "purpose": "Подметальный", "subtype": "Крупногабаритный"}, {"id": "R-030", "manufacturer": "FY-Bot", "country": "Китай", "model": "Sweep L", "type": "Уличная / Промышленная", "purpose": "Подметальный", "subtype": "Среднегабаритный"}, {"id": "R-001", "manufacturer": "Gausium", "country": "Китай", "model": "Phantas", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Малогабаритный"}, {"id": "R-002", "manufacturer": "Gausium", "country": "Китай", "model": "Scrubber 50", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-003", "manufacturer": "Gausium", "country": "Китай", "model": "Scrubber 75", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-004", "manufacturer": "Gausium", "country": "Китай", "model": "Vacuum 40", "type": "Внутренняя", "purpose": "Пылесос", "subtype": "Пылесос"}, {"id": "R-005", "manufacturer": "Gausium", "country": "Китай", "model": "Omnie", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-022", "manufacturer": "iKitBot", "country": "Китай", "model": "One S55", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Малогабаритный"}, {"id": "R-009", "manufacturer": "Kärcher", "country": "Германия", "model": "KIRA B 50", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-036", "manufacturer": "Keenon", "country": "Китай", "model": "Kleenbot C20", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Микро"}, {"id": "R-037", "manufacturer": "Keenon", "country": "Китай", "model": "Kleenbot C25", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Малогабаритный"}, {"id": "R-038", "manufacturer": "Keenon", "country": "Китай", "model": "Kleenbot C30", "type": "Внутренняя", "purpose": "Подметальный / Пылесос", "subtype": "Малогабаритный"}, {"id": "R-039", "manufacturer": "Keenon", "country": "Китай", "model": "Kleenbot C40", "type": "Внутренняя", "purpose": "Комбинированный", "subtype": "Малогабаритный"}, {"id": "R-014", "manufacturer": "Keenon", "country": "Китай", "model": "Kleenbot C55", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-011", "manufacturer": "LionsBot", "country": "Сингапур", "model": "R3 Scrub Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-040", "manufacturer": "LionsBot", "country": "Сингапур", "model": "R3 Vac", "type": "Внутренняя", "purpose": "Пылесос", "subtype": "Малогабаритный"}, {"id": "R-041", "manufacturer": "LionsBot", "country": "Сингапур", "model": "R5", "type": "Внутренняя", "purpose": "Подметально-поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-012", "manufacturer": "LionsBot", "country": "Сингапур", "model": "R12 Rex Scrub", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Крупногабаритный"}, {"id": "R-006", "manufacturer": "Pudu Robotics", "country": "Китай", "model": "CC1", "type": "Внутренняя", "purpose": "Комбинированный", "subtype": "Малогабаритный"}, {"id": "R-007", "manufacturer": "Pudu Robotics", "country": "Китай", "model": "CC1 Pro", "type": "Внутренняя", "purpose": "Комбинированный", "subtype": "Малогабаритный"}, {"id": "R-026", "manufacturer": "Pudu Robotics", "country": "Китай", "model": "MT1", "type": "Уличная / Промышленная", "purpose": "Подметальный", "subtype": "Микро"}, {"id": "R-042", "manufacturer": "Pudu Robotics", "country": "Китай", "model": "BG1", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-043", "manufacturer": "Pudu Robotics", "country": "Китай", "model": "BG1 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-044", "manufacturer": "Pudu Robotics", "country": "Китай", "model": "MT1 Max", "type": "Уличная / Промышленная", "purpose": "Подметальный", "subtype": "Микро"}, {"id": "R-023", "manufacturer": "Reeman", "country": "Китай", "model": "Snail Sweeping Cleaning Robot", "type": "Внутренняя", "purpose": "Подметальный", "subtype": "Малогабаритный"}, {"id": "R-033", "manufacturer": "Reeman", "country": "Китай", "model": "Smart Sweeping Robot", "type": "Уличная / Промышленная", "purpose": "Подметальный", "subtype": "Микро"}, {"id": "R-019", "manufacturer": "Rosiwit Cobotics", "country": "Китай", "model": "Polit One NEO", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-020", "manufacturer": "Rosiwit Cobotics", "country": "Китай", "model": "Titan 810", "type": "Внутренняя / Промышленная", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-015", "manufacturer": "SoftBank Robotics", "country": "Япония", "model": "Whiz", "type": "Внутренняя", "purpose": "Пылесос", "subtype": "Пылесос"}, {"id": "R-017", "manufacturer": "Sparkoz", "country": "Китай", "model": "TN10 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Малогабаритный"}, {"id": "R-018", "manufacturer": "Sparkoz", "country": "Китай", "model": "TN70 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-021", "manufacturer": "Sveaverken", "country": "Швеция", "model": "Sveabot M100", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Крупногабаритный"}, {"id": "R-032", "manufacturer": "Viggo (OneDrivePlus)", "country": "Китай", "model": "SC50 / SC50 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Среднегабаритный"}, {"id": "R-024", "manufacturer": "Viggo (OneDrivePlus)", "country": "Китай", "model": "SC80 / SC80 Pro", "type": "Внутренняя", "purpose": "Поломоечный", "subtype": "Крупногабаритный"}];
const IMAGE_STORE_KEY = 'roboCatalogImages_v1';
const body=document.getElementById('body'), q=document.getElementById('q'), m=document.getElementById('m'), s=document.getElementById('s'), count=document.getElementById('count');
function getImages(){ try { return JSON.parse(localStorage.getItem(IMAGE_STORE_KEY) || '{}'); } catch(e){ return {}; } }
function setImages(images){ localStorage.setItem(IMAGE_STORE_KEY, JSON.stringify(images)); }
function uniq(k){return [...new Set(robots.map(x=>x[k]))].sort((a,b)=>a.localeCompare(b,'ru'))}
function fill(sel, arr){arr.forEach(v=>{let o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o)})}
fill(m, uniq('manufacturer')); fill(s, uniq('subtype'));
function imageCell(r){
  const img = getImages()[r.id];
  if(img){return `<div class="photoBox"><img src="${img}" onclick="openModal('${r.id}')" alt="${r.model}"><div class="photoActions"><label>Заменить<input type="file" accept="image/*" onchange="uploadImage(event,'${r.id}')"></label><button onclick="removeImage('${r.id}')">×</button></div></div>`;}
  return `<div class="photoBox empty"><div class="placeholder">Нет фото</div><label>Добавить<input type="file" accept="image/*" onchange="uploadImage(event,'${r.id}')"></label></div>`;
}
function render(){
  const text=q.value.toLowerCase();
  const rows=robots.filter(r=>(!text||Object.values(r).join(' ').toLowerCase().includes(text))&&(!m.value||r.manufacturer===m.value)&&(!s.value||r.subtype===s.value));
  count.textContent=rows.length+' моделей';
  body.innerHTML=rows.map(r=>`<tr><td>${imageCell(r)}</td><td>${r.id}</td><td><b>${r.manufacturer}</b></td><td>${r.country}</td><td>${r.model}</td><td>${r.type}</td><td>${r.purpose}</td><td><span>${r.subtype}</span></td></tr>`).join('')
}
[q,m,s].forEach(x=>x.addEventListener('input',render));
function resizeImage(file, maxSize=260, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e => { const img = new Image(); img.onload = () => { const scale = Math.min(maxSize/img.width, maxSize/img.height, 1); const canvas = document.createElement('canvas'); canvas.width = Math.round(img.width*scale); canvas.height = Math.round(img.height*scale); canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height); resolve(canvas.toDataURL('image/jpeg', quality)); }; img.onerror = reject; img.src = e.target.result; };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
async function uploadImage(event, id){ const file = event.target.files[0]; if(!file) return; const dataUrl = await resizeImage(file); const images = getImages(); images[id] = dataUrl; setImages(images); render(); }
function removeImage(id){ const images=getImages(); delete images[id]; setImages(images); render(); }
function openModal(id){ const img=getImages()[id]; if(!img) return; document.getElementById('modalImg').src=img; document.getElementById('modal').classList.add('open'); }
document.getElementById('exportBtn').onclick = () => { const blob = new Blob([JSON.stringify(getImages())], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='robo-catalog-images.json'; a.click(); };
document.getElementById('importFile').onchange = async (e) => { const file=e.target.files[0]; if(!file) return; const text=await file.text(); const imported=JSON.parse(text); setImages({...getImages(), ...imported}); render(); };
document.getElementById('clearImagesBtn').onclick = () => { if(confirm('Удалить все фото, сохраненные в этом браузере?')){ localStorage.removeItem(IMAGE_STORE_KEY); render(); } };
render();
</script>
</body></html>
