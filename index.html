<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROBO Catalog</title><link rel="stylesheet" href="style.css">
</head>
<body>
<header><div><h1>ROBO Catalog</h1><p>Каталог роботов с редактируемыми карточками и вкладками</p></div><b id="count"></b></header>

<section class="controls">
<input id="q" placeholder="Поиск">
<select id="m"><option value="">Все производители</option></select>
<select id="s"><option value="">Все подтипы</option></select>
</section>

<section class="tools">
<button id="addRobot">Добавить робота</button>
<button id="exportAll">Скачать всю базу JSON</button>
<label>Загрузить базу JSON<input id="importAll" type="file" accept="application/json"></label>
<button id="resetEdits">Сбросить правки</button>
<p>Клик по строке открывает карточку. Заголовки колонок сортируют таблицу. Правки сохраняются в браузере.</p>
</section>

<main><table><thead><tr><th data-sort="hasImage">Фото <span class="sortMark"></span></th>
<th data-sort="id">ID <span class="sortMark"></span></th>
<th data-sort="manufacturer">Производитель <span class="sortMark"></span></th>
<th data-sort="model">Модель <span class="sortMark"></span></th>
<th data-sort="subtype">Подтип <span class="sortMark"></span></th>
<th>Характеристики</th>
<th>Навигация</th>
<th>Станция</th>
<th>ROBO-Аналитика</th>
<th data-sort="completion">Заполненность <span class="sortMark"></span></th></tr></thead><tbody id="body"></tbody></table></main>

<div id="card" class="card">
 <div class="panel">
  <button class="close" onclick="closeCard()">×</button>
  <h2 id="cardTitle"></h2><div id="cardCompletion" class="cardCompletion"></div>
  <div class="tabs">
    <button data-tab="passport" class="active">1. Паспорт</button>
    <button data-tab="tech">2. Характеристики</button>
    <button data-tab="nav">3. Навигация</button>
    <button data-tab="station">4. Станция</button>
    <button data-tab="analytics">5. ROBO-аналитика</button>
  </div>
  <div class="cardGrid">
    <div>
      <div id="cardPhoto" class="bigPhoto"></div>
      <label class="upload">Добавить/заменить фото<input id="cardFile" type="file" accept="image/*"></label>
      <button onclick="removeCurrentImage()">Удалить фото</button>
    </div>
    <form id="editForm">
      <div id="tabContent"></div>
      <div class="actions"><button type="submit">Сохранить</button><button type="button" onclick="closeCard()">Закрыть</button></div>
    </form>
  </div>
 </div>
</div>

function completionFieldFilled(r,k){if(['sweeping','vacuum','wetCleaning','flatDryWaste','pad','safetyBumper'].includes(k))return r[k]===true;return isFilledValue(r[k])}
function completionGroup(r,g){const a=completionGroups[g];return Math.round(a.filter(k=>completionFieldFilled(r,k)).length/a.length*100)}
function completionTotal(r){const a=Object.values(completionGroups).flat();return Math.round(a.filter(k=>completionFieldFilled(r,k)).length/a.length*100)}
function completionBadge(p){const c=p>=70?'good':p>=35?'mid':'bad';return `<div class="fillWrap"><span class="fillBadge ${c}">${p}%</span><div class="bar"><i class="${c}" style="width:${p}%"></i></div></div>`}

function imageCell(id){const img=getImages()[id];return img?`<img class="thumb" src="${img}">`:`<div class="miniPlaceholder">Нет фото</div>`}
function sortRows(rows){const images=getImages();const k=sortState.key, dir=sortState.dir==='asc'?1:-1;return [...rows].sort((a,b)=>{let av=k==='hasImage'?(images[a.id]?1:0):k==='completion'?completionTotal(a):(a[k]||'');let bv=k==='hasImage'?(images[b.id]?1:0):k==='completion'?completionTotal(b):(b[k]||'');if(typeof av==='number') return (av-bv)*dir; return String(av).localeCompare(String(bv),'ru',{numeric:true,sensitivity:'base'})*dir;})}
function updateSortMarks(){document.querySelectorAll('th[data-sort]').forEach(th=>{const mark=th.querySelector('.sortMark');mark.textContent=th.dataset.sort===sortState.key?(sortState.dir==='asc'?'↑':'↓'):'↕';})}

function val(v,suffix=''){return isFilledValue(v)?`${v}${suffix}`:'—'}
function yes(v){return v==='Да'||v===true?'✓':(v==='Нет'?'—':(isFilledValue(v)?v:'—'))}
function summaryTech(r){
  const tank = (isFilledValue(r.cleanWater)||isFilledValue(r.dirtyWater)) ? `${r.cleanWater||'—'}/${r.dirtyWater||'—'} л` : '—';
  const dims = (isFilledValue(r.length)||isFilledValue(r.widthSize)||isFilledValue(r.height)) ? `${r.length||'—'}×${r.widthSize||'—'}×${r.height||'—'} мм` : '';
  const funcs = [];
  if(r.sweeping) funcs.push('подмет.');
  if(r.vacuum) funcs.push('вакуум');
  if(r.wetCleaning) funcs.push('влажн.');
  if(r.flatDryWaste) funcs.push('сух. мусор');
  if(r.pad) funcs.push('ПАД');
  return `<div class="summaryCell" title="Ширина уборки: ${r.cleaningWidth||'—'} мм
Производительность: ${r.productivity||'—'} м²/ч
Баки: ${tank}
Контейнер: ${r.wasteContainer||'—'} л
Масса: ${r.weight||'—'} кг
Габариты: ${dims||'—'}
Функции: ${funcs.join(', ')||'—'}">
    <div>${val(r.cleaningWidth,' мм')}</div>
    <div>${val(r.productivity,' м²/ч')}</div>
    <div>${tank}</div>
    <div>${val(r.weight,' кг')}</div>
  </div>`;
}
function summaryNav(r){
  return `<div class="summaryCell" title="Тип навигации: ${r.navigationType||'—'}
Работа в толпе: ${r.crowdWork||'—'}
Интеграция с лифтом: ${r.elevatorIntegration||'—'}
FMS.ROBO: ${r.fmsRobo||'—'}
Бампер: ${r.safetyBumper?'Да':'Нет'}">
    <div>${r.navigationType||'—'}</div>
    <div>Лифт ${yes(r.elevatorIntegration)}</div>
    <div>FMS ${yes(r.fmsRobo)}</div>
    <div>Толпа ${r.crowdWork||'—'}</div>
  </div>`;
}
function summaryStation(r){
  return `<div class="summaryCell" title="Электрозарядная станция: ${r.chargingStation||'—'}
Док-станция 3-в-1: ${r.dock3in1||'—'}">
    <div>⚡ ${yes(r.chargingStation)}</div>
    <div>3в1 ${yes(r.dock3in1)}</div>
  </div>`;
}
const objectLabels = [
  ['objTransportHub','Вокзалы','🚉'],
  ['objBusinessGallery','БЦ/ТРЦ','🏢'],
  ['objResidentialLobby','Лобби ЖК','🏠'],
  ['objCulture','Музеи','🏛️'],
  ['objEducation','Образование','🎓'],
  ['objOffice','Офис','💼'],
  ['objIndustrial','Промышленность','🏭'],
  ['objWarehouse','Склад','📦'],
  ['objFoodservice','Общепит','🍽️'],
  ['objRetail','Торговля','🛒'],
  ['objParking','Паркинг','🅿️']
];
function summaryRobo(r){
  const scored = objectLabels
    .map(([key,label,icon]) => ({key,label,icon,score: Number(r[key])}))
    .filter(x => !Number.isNaN(x.score) && isFilledValue(r[x.key]))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);
  const top = scored.map(x=>`<div>${x.icon} ${x.score}</div>`).join('') || '<div>—</div>';
  const title = objectLabels.map(([key,label])=>`${label}: ${isFilledValue(r[key])?r[key]:'—'}`).join('\n');
  return `<div class="summaryCell" title="ROBO Rating: ${r.roboRating||'—'}
${title}">
    <div>⭐ ${r.roboRating||'—'}</div>${top}
  </div>`;
}

function render(){const text=q.value.toLowerCase();let rows=robots.filter(r=>(!text||Object.values(r).join(' ').toLowerCase().includes(text))&&(!m.value||r.manufacturer===m.value)&&(!s.value||r.subtype===s.value));rows=sortRows(rows);count.textContent=rows.length+' моделей';body.innerHTML=rows.map(r=>`<tr onclick="openCard('${r.id}')"><td>${imageCell(r.id)}</td><td>${r.id}</td><td><b>${r.manufacturer}</b><div class="muted">${r.country||''}</div></td><td>${r.model||''}<div class="muted">${r.purpose||''}</div></td><td><span>${r.subtype||''}</span></td><td>${summaryTech(r)}</td><td>${summaryNav(r)}</td><td>${summaryStation(r)}</td><td>${summaryRobo(r)}</td><td>${completionBadge(completionTotal(r))}</td></tr>`).join('');updateSortMarks();}
[q,m,s].forEach(x=>x.addEventListener('input',render));
document.querySelectorAll('th[data-sort]').forEach(th=>th.onclick=()=>{const key=th.dataset.sort;sortState=sortState.key===key?{key,dir:sortState.dir==='asc'?'desc':'asc'}:{key,dir:'asc'};setSort(sortState);render();});
refill();render();

function nextId(){let max=0;robots.forEach(r=>{const n=parseInt(String(r.id||'').replace(/\D/g,''));if(n>max)max=n;});return 'R-'+String(max+1).padStart(3,'0');}
document.getElementById('addRobot').onclick=()=>{const r={id:nextId(),manufacturer:'',country:'',model:'',type:'',purpose:'',subtype:'',status:'Требует проверки'};initialRobots[0]&&Object.keys(initialRobots[0]).forEach(k=>{if(!(k in r))r[k]='';});robots.push(r);setRobots(robots);refill();render();openCard(r.id);};

function selectHtml(name,value,options){return `<select name="${name}">${options.map(o=>`<option value="${o}" ${String(value||'')===String(o)?'selected':''}>${o||'—'}</option>`).join('')}</select>`}
function inputHtml(name,value,type='text'){return `<input name="${name}" type="${type}" value="${String(value||'').replaceAll('"','&quot;')}">`}
function checkboxHtml(name,value,label){return `<label class="check"><input name="${name}" type="checkbox" ${value?'checked':''}> ${label}</label>`}
function field(label,html){return `<label><span>${label}</span>${html}</label>`}

function tabPassport(r){const mans=['',...uniq('manufacturer')]; return `<div class="fields">
${field('ID (автоматически)',`<input value="${r.id}" disabled>`)}
${field('Производитель',selectHtml('manufacturer',r.manufacturer,mans))}
${field('Страна (автоматически)',`<input name="country" value="${r.country||''}" readonly>`)}
${field('Модель',inputHtml('model',r.model))}
${field('Тип эксплуатации',selectHtml('type',r.type,dictionaries.type))}
${field('Назначение',selectHtml('purpose',r.purpose,dictionaries.purpose))}
${field('Подтип',selectHtml('subtype',r.subtype,dictionaries.subtype))}
${field('Статус',selectHtml('status',r.status,dictionaries.status))}
${field('Ссылка на модель',inputHtml('link',r.link,'url'))}
</div>`}
function tabTech(r){return `<div class="fields">
${field('Ширина уборки, мм',inputHtml('cleaningWidth',r.cleaningWidth,'number'))}
${field('Производительность, м²/ч',inputHtml('productivity',r.productivity,'number'))}
${field('Бак чистой воды, л',inputHtml('cleanWater',r.cleanWater,'number'))}
${field('Бак грязной воды, л',inputHtml('dirtyWater',r.dirtyWater,'number'))}
${field('Контейнер / бункер мусора, л',inputHtml('wasteContainer',r.wasteContainer,'number'))}
${field('Масса, кг',inputHtml('weight',r.weight,'number'))}
${field('Длина, мм',inputHtml('length',r.length,'number'))}
${field('Ширина, мм',inputHtml('widthSize',r.widthSize,'number'))}
${field('Высота, мм',inputHtml('height',r.height,'number'))}
</div><h3>Функции уборки</h3><div class="checks">
${checkboxHtml('sweeping',r.sweeping,'Функция подметания')}
${checkboxHtml('vacuum',r.vacuum,'Функция вакуумного пылесоса')}
${checkboxHtml('wetCleaning',r.wetCleaning,'Функция влажной уборки пола')}
${checkboxHtml('flatDryWaste',r.flatDryWaste,'Функция сбора плоского сухого мусора в контейнер')}
${checkboxHtml('pad',r.pad,'Функция ПАД')}
</div><div id="brushTypeWrap" class="fields">${field('Тип моющего узла',selectHtml('brushType',r.brushType,dictionaries.brushType))}</div>`}
function tabNav(r){return `<div class="fields">
${field('Тип навигации',selectHtml('navigationType',r.navigationType,dictionaries.navigationType))}
${field('Работа в толпе',selectHtml('crowdWork',r.crowdWork,dictionaries.crowdWork))}
${field('Интеграция с лифтом',selectHtml('elevatorIntegration',r.elevatorIntegration,dictionaries.elevatorIntegration))}
${field('Подключение к FMS.ROBO',selectHtml('fmsRobo',r.fmsRobo,dictionaries.fmsRobo))}
</div><h3>Безопасность</h3><div class="checks">${checkboxHtml('safetyBumper',r.safetyBumper,'Бампер безопасности')}</div>`}
function tabStation(r){return `<div class="fields">
${field('Наличие электрозарядной станции',selectHtml('chargingStation',r.chargingStation,dictionaries.yesNo))}
${field('Наличие док-станции 3-в-1',selectHtml('dock3in1',r.dock3in1,dictionaries.yesNo))}
</div>`}
function scoreField(name,label,r){return field(label,selectHtml(name,r[name],dictionaries.score03))}
function tabAnalytics(r){return `<div class="fields">
${field('ROBO Rating, 0–10',inputHtml('roboRating',r.roboRating,'number'))}
</div><h3>Рекомендуемые объекты, 0–3 балла</h3><div class="fields">
${scoreField('objTransportHub','Аэро-, ЖД-, Авто-вокзальные комплексы',r)}
${scoreField('objBusinessGallery','Галерея БЦ, ТРЦ',r)}
${scoreField('objResidentialLobby','Лобби ЖК',r)}
${scoreField('objCulture','Объекты культурного наследия / музеи / выставочные комплексы',r)}
${scoreField('objEducation','Объекты среднего/специального/высшего образования',r)}
${scoreField('objOffice','Офис',r)}
${scoreField('objIndustrial','Промышленное предприятие / цех завода',r)}
${scoreField('objWarehouse','Склад',r)}
${scoreField('objFoodservice','Столовая / общепит',r)}
${scoreField('objRetail','Торговая площадь',r)}
${scoreField('objParking','Подземный паркинг',r)}
</div><label class="wide"><span>Комментарий эксперта ROBO</span><textarea name="roboComment">${r.roboComment||''}</textarea></label>`}

function openCard(id){currentId=id;currentTab='passport';drawCard();document.getElementById('card').classList.add('open')}
function drawCard(){const r=robots.find(x=>x.id===currentId);if(!r)return;document.getElementById('cardTitle').textContent=`${r.manufacturer||'Новый производитель'} ${r.model||''}`;document.getElementById('cardCompletion').innerHTML=`Заполненность: ${completionBadge(completionTotal(r))} <span>Паспорт ${completionGroup(r,'passport')}%</span><span>ТТХ ${completionGroup(r,'tech')}%</span><span>Навигация ${completionGroup(r,'nav')}%</span><span>Станция ${completionGroup(r,'station')}%</span><span>ROBO ${completionGroup(r,'analytics')}%</span>`;drawPhoto();document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===currentTab));const map={passport:tabPassport,tech:tabTech,nav:tabNav,station:tabStation,analytics:tabAnalytics};document.getElementById('tabContent').innerHTML=map[currentTab](r);bindDynamicFields();}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{saveCurrentForm(false);currentTab=b.dataset.tab;drawCard();});
function closeCard(){saveCurrentForm(false);document.getElementById('card').classList.remove('open');currentId=null}
function drawPhoto(){const img=getImages()[currentId];document.getElementById('cardPhoto').innerHTML=img?`<img src="${img}">`:'<div>Нет фото</div>'}
function bindDynamicFields(){const mf=document.querySelector('[name="manufacturer"]');if(mf)mf.onchange=()=>{const c=document.querySelector('[name="country"]');if(c)c.value=manufacturerCountries[mf.value]||'';}; const wet=document.querySelector('[name="wetCleaning"]'); const wrap=document.getElementById('brushTypeWrap'); if(wet&&wrap){const upd=()=>wrap.style.display=wet.checked?'grid':'none'; wet.onchange=upd; upd();}}
function formValue(el){return el.type==='checkbox'?el.checked:el.value}
function saveCurrentForm(update=true){if(!currentId)return;const r=robots.find(x=>x.id===currentId);const form=document.getElementById('editForm');if(!r||!form)return;form.querySelectorAll('input[name],select[name],textarea[name]').forEach(el=>r[el.name]=formValue(el));setRobots(robots);if(update){refill();render();drawCard();}}
document.getElementById('editForm').onsubmit=e=>{e.preventDefault();saveCurrentForm(true);};
function resizeImage(file,maxSize=520,quality=.76){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=e=>{const im=new Image();im.onload=()=>{const sc=Math.min(maxSize/im.width,maxSize/im.height,1);const c=document.createElement('canvas');c.width=Math.round(im.width*sc);c.height=Math.round(im.height*sc);c.getContext('2d').drawImage(im,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',quality))};im.onerror=rej;im.src=e.target.result};rd.onerror=rej;rd.readAsDataURL(file)})}
document.getElementById('cardFile').onchange=async e=>{const f=e.target.files[0];if(!f||!currentId)return;const imgs=getImages();imgs[currentId]=await resizeImage(f);setImages(imgs);drawPhoto();render()};
function removeCurrentImage(){if(!currentId)return;const imgs=getImages();delete imgs[currentId];setImages(imgs);drawPhoto();render()}

document.getElementById('exportAll').onclick=()=>{const blob=new Blob([JSON.stringify({robots,images:getImages()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='robo-catalog-full.json';a.click()};
document.getElementById('importAll').onchange=async e=>{const f=e.target.files[0];if(!f)return;const data=JSON.parse(await f.text());if(data.robots){robots=data.robots;setRobots(robots)}if(data.images){setImages({...getImages(),...data.images})}refill();render()};
document.getElementById('resetEdits').onclick=()=>{if(confirm('Сбросить все текстовые правки? Фото останутся.')){localStorage.removeItem(ROBOTS_KEY);robots=getRobots();refill();render()}};
</script>
</body></html>
